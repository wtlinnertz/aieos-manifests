# Rendered from aieos-artifact-store/kustomize/overlays/prod via the publish.manifest
# pattern (adapter-kustomize-build). Seed manifest for the v1 reference consumer;
# the image tag stays PLACEHOLDER until a CI run substitutes the signed OCI digest.
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/part-of: aieos
  name: aieos-artifact-store-prod
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/name: aieos-artifact-store
    app.kubernetes.io/part-of: aieos
  name: aieos-artifact-store
  namespace: aieos-artifact-store-prod
spec:
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: http
  selector:
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/name: aieos-artifact-store
    app.kubernetes.io/part-of: aieos
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/name: aieos-artifact-store
    app.kubernetes.io/part-of: aieos
  name: aieos-artifact-store
  namespace: aieos-artifact-store-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: flux
      app.kubernetes.io/name: aieos-artifact-store
      app.kubernetes.io/part-of: aieos
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: flux
        app.kubernetes.io/name: aieos-artifact-store
        app.kubernetes.io/part-of: aieos
    spec:
      containers:
      - image: ghcr.io/wtlinnertz/aieos-artifact-store:PLACEHOLDER
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        name: app
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 2
          periodSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
